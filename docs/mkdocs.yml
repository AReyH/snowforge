site_name: snowcraft
site_description: The Snowflake standard library that never shipped.
site_author: Arturo Rey
repo_url: https://github.com/AReyH/snowcraft
repo_name: AReyH/snowcraft

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Connection: api/connection.md
      - Merge: api/merge.md
      - Schema: api/schema.md
      - Profiler: api/profiler.md
      - SCD: api/scd.md
      - Exceptions: api/exceptions.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
